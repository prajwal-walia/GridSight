name: GridSight CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-lint:
    name: Backend — Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd backend
          pip install flake8
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          cd backend
          # Stop on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings only for style issues
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  frontend-build:
    name: Frontend — TypeScript Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: TypeScript type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build
        run: |
          cd frontend
          npm run build

  docker-build:
    name: Docker — Compose Build
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Verify containers start
        run: |
          docker compose up -d
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8000/health; then
              echo " Backend is up!"
              exit 0
            fi
            echo "Waiting for backend... ($i/12)"
            sleep 5
          done
          echo "Backend failed to start"
          docker compose logs backend
          exit 1

      - name: Teardown
        if: always()
        run: docker compose down
